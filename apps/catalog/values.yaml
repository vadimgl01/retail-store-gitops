replicaCount: 1

image:
  repository: 630019796862.dkr.ecr.eu-central-1.amazonaws.com/retail-vadim-store-catalog
  pullPolicy: Always
  tag: "latest"

imagePullSecrets:
  - name: regcred

# --- FIX: ROOT LEVEL INJECTION ---
# The Helm template uses 'extraEnv' to populate the container's environment.
extraEnv:
  - name: CATALOG_DATABASE_TYPE
    value: "mysql"
  - name: CATALOG_DATABASE_ENDPOINT
    value: "catalog-mysql:3306"
  - name: CATALOG_DATABASE_NAME
    value: "catalog"
  - name: CATALOG_DATABASE_USER
    value: "catalog_user"
  - name: CATALOG_DATABASE_PASSWORD
    value: "my-secret-pw"
  - name: DB_NAME
    value: "catalog"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 80

resources:
  limits:
    memory: 256Mi
  requests:
    cpu: 256m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

metrics:
  enabled: true
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"

configMap:
  create: true
  name: ""

# 1. ROOT LEVEL
persistence:
  provider: mysql
  endpoint: "catalog-mysql:3306"
  dbName: "catalog"

# 2. APP LEVEL
app:
  persistence:
    provider: "mysql"
    secret:
      create: true
      name: "catalog-db"
      username: "catalog_user"
      password: "my-secret-pw"

# 3. MYSQL CONFIGURATION
mysql:
  create: true
  mysqlDatabase: "catalog"
  # Added 'auth' block to fix the "Empty DB" issue found in your describe output
  auth:
    database: "catalog"
    rootPassword: "my-secret-pw"
    username: "catalog_user"
    password: "my-secret-pw"
  mysqlUser: "catalog_user"
  mysqlPassword: "my-secret-pw"
  image:
    repository: public.ecr.aws/docker/library/mysql
    pullPolicy: IfNotPresent
    tag: "8.0"
  service:
    type: ClusterIP
    port: 3306
  persistentVolume:
    enabled: true
    storageClass: "retail-vadim-gp2"
    size: 8Gi
    accessModes:
      - ReadWriteOnce

securityGroups:
  create: false
  securityGroupIds: []

opentelemetry:
  enabled: false
  instrumentation: ""

podDisruptionBudget:
  enabled: false
  minAvailable: 2
  maxUnavailable: 1
